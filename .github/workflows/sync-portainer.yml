name: Sync Portainer Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-portainer
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check sync token
        id: guard
        shell: bash
        run: |
          if [ -n "${{ secrets.PORTAINER_SYNC_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Portainer Sync"
              echo ""
              echo "Defina o secret \`PORTAINER_SYNC_TOKEN\` neste repositório para habilitar a sincronização com \`GustavoDevGTI/Amargosaturismo-Portainer\`."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout source repository
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Portainer repository
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: GustavoDevGTI/Amargosaturismo-Portainer
          token: ${{ secrets.PORTAINER_SYNC_TOKEN }}
          path: portainer-repo
          fetch-depth: 0

      - name: Mirror site files into Portainer repository
        if: steps.guard.outputs.enabled == 'true'
        shell: bash
        run: |
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.dockerignore' \
            --exclude='Dockerfile' \
            --exclude='docker-compose.yml' \
            --exclude='nginx.conf' \
            --exclude='README.md' \
            --exclude='PORTAINER.md' \
            ./ ./portainer-repo/

      - name: Commit and push synchronized changes
        if: steps.guard.outputs.enabled == 'true'
        shell: bash
        run: |
          cd portainer-repo

          if [ -z "$(git status --porcelain)" ]; then
            {
              echo "## Portainer Sync"
              echo ""
              echo "Nenhuma mudança nova para sincronizar."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync from Amargosaturismo@${GITHUB_SHA::7}"
          git push origin HEAD:main

          {
            echo "## Portainer Sync"
            echo ""
            echo "Sincronizado com sucesso para \`GustavoDevGTI/Amargosaturismo-Portainer\` a partir de \`${GITHUB_SHA::7}\`."
          } >> "$GITHUB_STEP_SUMMARY"
