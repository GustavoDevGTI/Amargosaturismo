services:
  amargosaturismo-db:
    image: mysql:8.0.45
    container_name: amargosaturismo-db
    restart: unless-stopped
    command: ["--max_allowed_packet=256M"]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-amargosaturismo}
      MYSQL_USER: ${MYSQL_USER:-amargosa_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-amargosa123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    volumes:
      - amargosa_mysql8_data:/var/lib/mysql
      - ./api/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  amargosaturismo-api:
    build:
      context: ./api
    container_name: amargosaturismo-api
    restart: unless-stopped
    environment:
      API_PORT: 3000
      DB_HOST: amargosaturismo-db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-amargosaturismo}
      DB_USER: ${MYSQL_USER:-amargosa_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-amargosa123}
      UPLOAD_DIR: uploads
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-turismo@123}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-change-this-admin-session-secret}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
    volumes:
      - amargosa_uploads:/app/uploads
    depends_on:
      amargosaturismo-db:
        condition: service_healthy

  amargosaturismo:
    build:
      context: .
    container_name: amargosaturismo
    restart: unless-stopped
    ports:
      - target: 80
        published: "${SITE_PORT:-8080}"
        protocol: tcp
    depends_on:
      amargosaturismo-api:
        condition: service_healthy

volumes:
  amargosa_mysql8_data:
  amargosa_uploads:
